{% load static %}
{% load budgetextra %}

<div class="sidebar-right sidebar pb-3 bg-dark text-light">
    <nav class="navbar navbar-dark flex-column align-items-stretch">
        
        <!-- Profile Section -->
        <div class="nav-item dropdown text-center mb-4">
            <a href="#" class="d-flex align-items-center justify-content-center profile-dropdown" data-bs-toggle="dropdown">
                <div class="position-relative me-2">
                    <img class="rounded-circle shadow-sm" src="{% static 'img/user.jpg' %}" alt="Profile" style="width: 50px; height: 50px;">
                    <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                </div>
                <div class="d-none d-lg-block text-start">
                    <h6 class="mb-0 fw-semibold text-primesec">{{ name }}</h6>
                    <small class="text-light">Admin NU</small>
                </div>
                <i class="fa fa-chevron-down ms-2 small text-primesec"></i>
            </a>
            <div class="dropdown-menu dropdown-menu-end bg-secondary border-0 shadow rounded-3 mt-2">
                <form id="logoutform" method="post" action="{% url 'logoutuser' %}">
                    {% csrf_token %}
                    <a class="dropdown-item text-primesec py-2" href="#" onclick="document.getElementById('logoutform').submit(); return false;">
                        <i class="fa fa-sign-out-alt me-2 text-primesec"></i>Logout
                    </a>
                </form>
            </div>
        </div>

        <!-- Accounts List -->
        <div class="account-list-container px-2">
            <div class="accounts-divider my-4">
                <span class="accounts-label">Accounts</span>
            </div>  
            <div class="account-list">
                {% for accounttype in accounttypes %}
                {% for account in accounttype.accounts.all %}
                <div class="account-border account-item d-flex align-items-center justify-content-between rounded-3 p-2 mb-2 shadow-sm hover-glow"
                    data-account-type="{{ account.type.name|lower }}"
                    data-account-id="{{ account.id }}">
                    <div class="d-flex align-items-center">
                        <div class="account-icon-wrapper bg-dark rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 35px; height: 35px;">
                            <i class="fa {{ accounticonmap|getitem:account.type.name|default:'fa-folder' }} "></i>
                        </div>
                        <div class="d-flex flex-column">
                            <span class="account-name fw-medium text-primesec">{{ account.name }}</span>
                            <span class="text-muted small">{{ account.institution.name }}</span>
                        </div>
                    </div>
                    <span class="account-balance fw-semibold text-primesec">${{ account.balance }}</span>
                </div>
                {% endfor %}
                {% endfor %}
            </div>
        </div>

        <!-- Footer -->
        <div class="sidebar-footer mt-auto text-center pt-3">
            <small class="text-muted">© 2025 FinanceApp</small>
        </div>
    </nav>
</div>
