name: Django Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLIC_KEY: ${{ secrets.SUPABASE_PUBLIC_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_ENV: ${{ vars.APP_ENV }}
      DEBUG: ${{ vars.DEBUG }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: project_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Migration Integrity
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django Tests
        run: python manage.py test

      - name: Health Check (Cold Start Support)
        run: |
          echo "Waking up the staging instance..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 60 --retry 3 --retry-delay 5 https://deltab-staging.onrender.com/health/)
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "Health Check Passed."
          else
            echo "Health Check Failed with status: $RESPONSE"
            exit 1
          fi

      - name: Trigger Render Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}