name: Django Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    
    # These satisfy your config.py validation
    env:
      SECRET_KEY: "ci-secret-key"
      DATABASE_URL: "postgres://user:password@localhost:5432/project_db"
      SUPABASE_URL: "https://xyz.supabase.co"
      SUPABASE_PUBLIC_KEY: "mock-key"
      SUPABASE_SERVICE_KEY: "mock-key"
      APP_ENV: "staging"

    services:
      # This creates the actual DB for the tests to talk to
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: project_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Django Tests
        run: python manage.py test

      - name: Trigger Render Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Health Check (With Cold Start Support)
        run: |
          echo "Waking up the Free Tier instance..."
          # --connect-timeout 60 gives it a full minute to spin up from sleep
          # --retry 3 tries again if the connection is refused during boot
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 60 --retry 3 --retry-delay 5 https://your-app-url.render.com/health/)
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "Health Check Passed: App is awake and responding."
          else
            echo "Health Check Failed with status: $RESPONSE"
            exit 1
          fi