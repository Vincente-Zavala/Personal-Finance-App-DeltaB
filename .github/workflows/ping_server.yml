name: Project Warm-up (Business Hours)

on:
  schedule:
    - cron: '*/14 12-23 * * 1-5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up DeltaB
        run: |
          curl -sI https://deltab-staging.onrender.com/health/ | head -n 1
          curl -sI https://deltab.onrender.com/health/ | head -n 1
          echo "Sites pinged at $(date)"